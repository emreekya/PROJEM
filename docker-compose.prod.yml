# MoneyPrinterTurbo production compose
# Gerçek token/API key BU DOSYAYA yazılmaz.
#
# Kullanım:
#   cp .env.production.example .env.production
#   cp config.example.toml config.toml
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moneyprinterturbo-webui
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PYTHONPATH: /MoneyPrinterTurbo
      MPT_APP_REDIS_HOST: redis
    command:
      - streamlit
      - run
      - ./webui/Main.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --browser.serverAddress=${PUBLIC_HOST:-127.0.0.1}
      - --browser.gatherUsageStats=false
      - --server.enableCORS=true
      - --server.enableXsrfProtection=true
    ports:
      # Dış dünyaya direkt açılmaz. Nginx içeriden bu porta bağlanır.
      - "127.0.0.1:${WEBUI_PORT:-8501}:8501"
    volumes:
      - ./config.toml:/MoneyPrinterTurbo/config.toml
      - ./storage:/MoneyPrinterTurbo/storage
      - ./resource:/MoneyPrinterTurbo/resource
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moneyprinterturbo-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PYTHONPATH: /MoneyPrinterTurbo
      MPT_APP_REDIS_HOST: redis
    command:
      - python3
      - main.py
    ports:
      # Dış dünyaya direkt açılmaz. Nginx içeriden bu porta bağlanır.
      - "127.0.0.1:${API_PORT:-8080}:8080"
    volumes:
      - ./config.toml:/MoneyPrinterTurbo/config.toml
      - ./storage:/MoneyPrinterTurbo/storage
      - ./resource:/MoneyPrinterTurbo/resource
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/docs', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: moneyprinterturbo-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
